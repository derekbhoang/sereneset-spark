name: sereneset-spark

x-backend-service: &backend-service
  image: sereneset-spark-backend:${APP_VERSION:-latest}
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - ${ENV_FILE:-.env.production}
  environment:
    ENVIRONMENT: production
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  api:
    <<: *backend-service
    expose:
      - "8000"
    stop_grace_period: ${API_STOP_GRACE_PERIOD:-12m}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen(
          "http://127.0.0.1:8000/api/v1/health", timeout=5).close()
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    <<: *backend-service
    command: ["python", "-m", "app.workers.video_generation"]
    depends_on:
      api:
        condition: service_healthy
    stop_grace_period: ${WORKER_STOP_GRACE_PERIOD:-20m}

  frontend:
    image: sereneset-spark-frontend:${APP_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
